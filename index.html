<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CanaryTrader — Charts MTF Trading Desk</title>

<!-- Webamp + Butterchurn -->
<script src="https://unpkg.com/webamp@1.5.0/built/webamp.bundle.min.js"></script>
<script src="https://unpkg.com/butterchurn@2.6.7/lib/butterchurn.min.js"></script>
<script src="https://unpkg.com/butterchurn-presets@2.4.7/lib/butterchurnPresets.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  font-family: 'Roboto', Arial, sans-serif;
  height: 100%;
  overflow: hidden;
  background: #121212;
  color: #e0e0e0;
}

.main-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Header ── */
.header {
  background: #1e222d;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  border-bottom: 1px solid #2a2e39;
  z-index: 100;
  flex-shrink: 0;
}
.header h1 {
  font-size: 1.05rem;
  background: linear-gradient(90deg, #00d4aa, #6a6aff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.header-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  flex: 1;
}
select {
  padding: 5px 8px;
  font-size: 13px;
  background: #2a2e39;
  color: #d1d4dc;
  border: 1px solid #4a4f58;
  border-radius: 4px;
  outline: none;
}
select:focus { border-color: #00d4aa; }

.indicator-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.btn {
  padding: 4px 10px;
  background: #2a2e39;
  color: #d1d4dc;
  border: 1px solid #4a4f58;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.btn:hover { background: #3a3e4d; border-color: #00d4aa; }
.btn.active { background: #00d4aa22; border-color: #00d4aa; color: #00d4aa; }

.telegram-link {
  background: #0088cc;
  color: white;
  padding: 5px 12px;
  text-decoration: none;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
}
.telegram-link:hover { background: #0077b5; }

/* ── Ticker Tape ── */
.ticker-container {
  width: 100%;
  overflow: hidden;
  background: #1e222d;
  border-bottom: 1px solid #2a2e39;
  flex-shrink: 0;
  height: 64px;
  position: relative;
  z-index: 10000;
}
.ticker-canvas {
  width: calc((200px * 15) + 2px);
  animation: ticker-scroll 25s linear infinite;
}
.ticker-canvas:hover { animation-play-state: paused; }
@keyframes ticker-scroll {
  0%   { transform: translate3d(0,0,0); visibility: visible; }
  100% { transform: translate3d(-50%,0,0); }
}

/* ── Main Content ── */
.main-content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Chart Grid ── */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  grid-auto-rows: minmax(250px, 1fr);
  gap: 10px;
  padding: 10px;
  flex: 1;
  overflow-y: auto;
}

.chart-container {
  background: #1e222d;
  border: 1px solid #2a2e39;
  border-radius: 6px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s, transform 0.2s;
}
.chart-container:hover {
  border-color: #00d4aa55;
  transform: translateY(-2px);
}
.chart-header {
  background: #2a2e39;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: bold;
  color: #d1d4dc;
  letter-spacing: 0.3px;
}
.chart-body { flex: 1; min-height: 200px; }

/* ── Sidebar ── */
.sidebar {
  width: 280px;
  background: #1e222d;
  border-left: 1px solid #2a2e39;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
}
.widget {
  background: #2a2e39;
  border-radius: 5px;
  padding: 10px;
}
.widget h3 {
  font-size: 11px;
  color: #00d4aa;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.timeframe-buttons, .chart-options-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.relevant-data {
  font-size: 11px;
  margin-bottom: 4px;
  color: #aaa;
}
.relevant-data strong { color: #00d4aa; }

/* ── Webamp renders into #webamp-app — bottom-left ── */
#webamp-app {
  position: fixed;
  bottom: 0;
  left: 0;
  z-index: 1000;
}

/* ── IA Search Panel — bottom-right ── */
#ia-panel {
  position: fixed;
  bottom: 0;
  right: 16px;
  z-index: 1001;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0;
}

#ia-search-box {
  background: rgba(20, 22, 34, 0.97);
  border: 1px solid #2a2d3a;
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  padding: 10px 12px;
  width: 320px;
  display: none;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
}
#ia-search-box.open { display: flex; }
#ia-search-box h3 {
  font-size: 0.7rem;
  color: #00d4aa;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
#ia-search-row { display: flex; gap: 6px; }
#ia-query {
  flex: 1;
  background: #0d0f14;
  border: 1px solid #2a2d3a;
  color: #e0e0e0;
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 0.8rem;
  outline: none;
}
#ia-query:focus { border-color: #00d4aa; }
#ia-search-btn {
  background: #00d4aa;
  color: #0d0f14;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
}
#ia-search-btn:hover { background: #00bfa0; }
#ia-tips { font-size: 0.65rem; color: #444; }
#ia-tips span { color: #00d4aa; cursor: pointer; }
#ia-tips span:hover { text-decoration: underline; }
#ia-results-list {
  max-height: 220px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
#ia-results-list::-webkit-scrollbar { width: 4px; }
#ia-results-list::-webkit-scrollbar-track { background: #0d0f14; }
#ia-results-list::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
.ia-track {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 4px;
  transition: background 0.15s;
}
.ia-track:hover { background: #232636; }
.ia-track-info { flex: 1; overflow: hidden; }
.ia-track-title { font-size: 0.75rem; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ia-track-meta  { font-size: 0.65rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ia-add-btn {
  background: none;
  border: 1px solid #2a2d3a;
  color: #00d4aa;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.ia-add-btn:hover { background: #00d4aa22; }
.ia-add-btn.play { background: #00d4aa; color: #0d0f14; }
.ia-no-results { font-size: 0.75rem; color: #555; text-align: center; padding: 12px 0; }

#ia-toggle {
  background: rgba(20, 22, 34, 0.97);
  border: 1px solid #2a2d3a;
  border-radius: 8px 8px 0 0;
  padding: 6px 14px;
  font-size: 0.75rem;
  color: #00d4aa;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
  backdrop-filter: blur(8px);
}
#ia-toggle:hover { background: rgba(28, 30, 48, 0.97); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #1e222d; }
::-webkit-scrollbar-thumb { background: #3a3e4d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #00d4aa55; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .sidebar { width: 100%; border-left: none; border-top: 1px solid #2a2e39; height: 200px; }
  .main-content { flex-direction: column; }
}
</style>
</head>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
// ══════════════════════════════════════════════════
//  CONFIGURATION & STATE
// ══════════════════════════════════════════════════
let currentSymbol = 'WHSELFINVEST:USTECH100CFD';
const ALL_TIMEFRAMES      = ['1','5','15','30','60','240','D','W','M','3M'];
const ALL_TIMEFRAME_NAMES = ['1 Minute','5 Minutes','15 Minutes','30 Minutes','1 Hour','4 Hours','1 Day','1 Week','1 Month','3 Months'];
let visibleCharts    = 4;
let selectedIndicators = ['RSI'];
let activeTimeframes = new Set(['5','30','240','D']);
let chartConfig = {
  hide_side_toolbar: true,
  hide_top_toolbar: false,
  withdateranges: true,
  allow_symbol_change: true,
  details: true,
  hotlist: true,
  calendar: false,
  autosize: true
};

// Donchian channel settings (from 6charts reference, applied to all TFs)
const DONCHIAN_STUDY = {
  id: 'DONCH@tv-basicstudies',
  inputs: { length: 58, source: 'close' }
};
const DONCHIAN_OVERRIDES = {
  'DONCH@tv-basicstudies.Upper Band.color':  '#00d4aa',
  'DONCH@tv-basicstudies.Upper Band.linewidth': 1,
  'DONCH@tv-basicstudies.Lower Band.color':  '#6a6aff',
  'DONCH@tv-basicstudies.Lower Band.linewidth': 1,
  'DONCH@tv-basicstudies.Basis.color':        '#888888',
  'DONCH@tv-basicstudies.Basis.linewidth':    1,
};

// ══════════════════════════════════════════════════
//  TRADINGVIEW CHARTS
// ══════════════════════════════════════════════════
function indicatorStudyId(ind) {
  const map = {
    RSI: 'RSI@tv-basicstudies', MACD: 'MACD@tv-basicstudies',
    BB: 'BB@tv-basicstudies', ATR: 'ATR@tv-basicstudies',
    OBV: 'OBV@tv-basicstudies', VWAP: 'VWAP@tv-basicstudies',
    CCI: 'CCI@tv-basicstudies'
  };
  return map[ind] || ind + '@tv-basicstudies';
}

function createChart(containerId, symbol, interval, tfName) {
  const studies = [
    DONCHIAN_STUDY,
    ...selectedIndicators.map(ind => indicatorStudyId(ind))
  ];

  new TradingView.widget({
    container_id: containerId,
    width: '100%',
    height: '100%',
    symbol,
    interval,
    timezone: 'America/New_York',
    theme: 'dark',
    style: '1',
    locale: 'en',
    toolbar_bg: '#1e222d',
    enable_publishing: false,
    hide_legend: false,
    save_image: false,
    studies,
    studies_overrides: {
      ...DONCHIAN_OVERRIDES,
      'rsi.rsi.color':       '#6a6aff',
      'rsi.rsi.linewidth':   2,
      'macd.macd.color':     '#00d4aa',
      'macd.signal.color':   '#ff9800',
      'volume.volume ma.color': '#ff6d00',
    },
    overrides: {
      'paneProperties.background':                      '#1e222d',
      'paneProperties.vertGridProperties.color':        'rgba(255,255,255,0.03)',
      'paneProperties.horzGridProperties.color':        'rgba(255,255,255,0.03)',
      'symbolWatermarkProperties.transparency':         90,
      'scalesProperties.textColor':                     '#d1d4dc',
      'mainSeriesProperties.candleStyle.upColor':       '#26a69a',
      'mainSeriesProperties.candleStyle.downColor':     '#ef5350',
      'mainSeriesProperties.candleStyle.drawWick':      true,
      'mainSeriesProperties.candleStyle.drawBorder':    true,
      'mainSeriesProperties.candleStyle.borderUpColor': '#26a69a',
      'mainSeriesProperties.candleStyle.borderDownColor': '#ef5350',
      'mainSeriesProperties.candleStyle.wickUpColor':   '#26a69a',
      'mainSeriesProperties.candleStyle.wickDownColor': '#ef5350',
    },
    ...chartConfig
  });

  const container = document.getElementById(containerId)?.closest('.chart-container');
  if (container) {
    container.querySelector('.chart-header').textContent = `${symbol.split(':').pop()} · ${tfName}`;
  }
}

function updateCharts(symbol) {
  const grid = document.getElementById('chart-grid');
  grid.innerHTML = '';
  let idx = 0;
  for (let i = 0; i < ALL_TIMEFRAMES.length && idx < visibleCharts; i++) {
    if (!activeTimeframes.has(ALL_TIMEFRAMES[i])) continue;
    const cid = `chart_${idx}`;
    const div = document.createElement('div');
    div.className = 'chart-container';
    div.innerHTML = `<div class="chart-header"></div><div id="${cid}" class="chart-body"></div>`;
    grid.appendChild(div);
    createChart(cid, symbol, ALL_TIMEFRAMES[i], ALL_TIMEFRAME_NAMES[i]);
    idx++;
  }
  updateMarketContext(symbol);
}

// ══════════════════════════════════════════════════
//  MARKET CONTEXT
// ══════════════════════════════════════════════════
function updateMarketContext(symbol) {
  const el = document.getElementById('relevant-data');
  const map = {
    'WHSELFINVEST:USTECH100CFD': `
      <div class="relevant-data"><strong>Tracking:</strong> Nasdaq 100</div>
      <div class="relevant-data"><strong>Components:</strong> 100 largest non-fin NASDAQ stocks</div>
      <div class="relevant-data"><strong>Key names:</strong> AAPL, MSFT, NVDA, AMZN, GOOGL, META, TSLA</div>
      <div class="relevant-data"><strong>Session:</strong> 09:30–16:00 ET (extended 04:00–20:00)</div>
      <div class="relevant-data"><strong>Correlated:</strong> QQQ, NQ futures, SQQQ/TQQQ</div>
    `,
    'INDEX:SPX': `
      <div class="relevant-data"><strong>Tracking:</strong> S&P 500</div>
      <div class="relevant-data"><strong>Components:</strong> 500 large-cap US equities</div>
      <div class="relevant-data"><strong>Correlated:</strong> SPY, ES futures, VIX (inverse)</div>
    `,
    'BITFINEX:BTCUSD': `
      <div class="relevant-data"><strong>Asset:</strong> Bitcoin</div>
      <div class="relevant-data"><strong>24/7 market</strong> — no session hours</div>
      <div class="relevant-data"><strong>Watch:</strong> Funding rate, open interest, BTC dominance</div>
    `,
  };
  el.innerHTML = map[symbol] || `<div class="relevant-data"><strong>Symbol:</strong> ${symbol.split(':').pop()}</div>`;
}

// ══════════════════════════════════════════════════
//  WEBAMP + INTERNET ARCHIVE MODULE (from webamp-ia.html)
//  Bottom-left, Milkdrop fullscreen on load, JSONP search
// ══════════════════════════════════════════════════
let webamp = null;
let webampPlaylist = [];
let iaSearchResults = [];
let searchOpen = false;

function initWebamp() {
  if (webamp) return;
  webamp = new Webamp({
    initialTracks: [{
      metaData: { artist: 'Internet Archive', title: 'Search IA above to add tracks' },
      url: 'https://cdn.jsdelivr.net/gh/captbaritone/webamp@43434d82cfe0e37286dbbe0666072dc3190a83bc/mp3/llama-2.91.mp3',
    }],
    __butterchurnOptions: {
      importButterchurn: () => Promise.resolve(window.butterchurn),
      getPresets: () => {
        const presets = window.butterchurnPresets.getPresets();
        return Object.keys(presets).map((name) => ({
          name, butterchurnPresetObject: presets[name],
        }));
      },
      butterchurnOpen: true,
    },
    __initialWindowLayout: {
      main:      { position: { x: 16, y: 50 } },
      equalizer: { position: { x: 16, y: 166 } },
      playlist:  { position: { x: 16, y: 282 }, size: [0, 4] },
      milkdrop:  { position: { x: 0,  y: 0  }, size: [0, 0] },
    },
  });

  webamp.renderWhenReady(document.getElementById('webamp-app')).then(() => {
    webamp.setMilkdropFullscreen(true);
  });

  webamp.onTrackDidChange(track => {
    if (track?.metaData?.title) {
      document.getElementById('toggle-label').textContent =
        ('♪ ' + track.metaData.title).slice(0, 28);
    }
  });
}

// F key toggles Milkdrop fullscreen
document.addEventListener('keydown', e => {
  if ((e.key === 'f' || e.key === 'F') && webamp) {
    webamp.toggleMilkdropFullscreen();
  }
});

function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('ia-search-box').classList.toggle('open', searchOpen);
  document.getElementById('toggle-icon').textContent = searchOpen ? '🔽' : '🎵';
  if (searchOpen) setTimeout(() => document.getElementById('ia-query').focus(), 50);
}

document.getElementById('ia-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') iaSearch();
});

function setQuery(text) {
  document.getElementById('ia-query').value = text;
  iaSearch();
}

// JSONP — bypasses file:// CORS for IA search
function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cb = 'ia_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const tid = setTimeout(() => { cleanup(); reject(new Error('Search timed out.')); }, 15000);
    function cleanup() { clearTimeout(tid); delete window[cb]; if (script.parentNode) script.remove(); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const script = document.createElement('script');
    script.src = url + '&callback=' + cb;
    script.onerror = () => { cleanup(); reject(new Error('Search failed.')); };
    document.head.appendChild(script);
  });
}

async function iaSearch() {
  const rawQuery = document.getElementById('ia-query').value.trim();
  if (!rawQuery) return;
  const listEl = document.getElementById('ia-results-list');
  listEl.innerHTML = '<div class="ia-no-results">⏳ Searching…</div>';
  iaSearchResults = [];

  const q = `(${encodeURIComponent(rawQuery)})+AND+mediatype:audio+AND+(collection:etree+OR+collection:audio_music+OR+collection:jamendo)+-title:test`;
  try {
    const json = await jsonpFetch(
      `https://archive.org/advancedsearch.php?q=${q}` +
      `&fl[]=identifier,title,creator,year,downloads&sort=downloads+desc&rows=25&output=json`
    );
    const docs = json?.response?.docs ?? [];
    if (!docs.length) { listEl.innerHTML = '<div class="ia-no-results">No results. Try a different search.</div>'; return; }

    iaSearchResults = docs.slice(0, 20).map(d => ({
      identifier: d.identifier,
      title: d.title || d.identifier,
      creator: Array.isArray(d.creator) ? d.creator[0] : (d.creator || ''),
      year: d.year || '',
      downloads: d.downloads || 0,
    }));

    listEl.innerHTML = iaSearchResults.map((t, i) => {
      const badge = t.downloads > 1000
        ? `<span style="color:#00d4aa;font-size:0.62rem">🔥${fmtK(t.downloads)}</span>` : '';
      return `
        <div class="ia-track" id="ia-row-${i}">
          <div class="ia-track-info">
            <div class="ia-track-title" title="${esc(t.title)}">${esc(t.title)}</div>
            <div class="ia-track-meta">${esc(t.creator)}${t.year?' · '+t.year:''} ${badge}</div>
          </div>
          <button class="ia-add-btn" onclick="addTrack(${i},false)">+ Add</button>
          <button class="ia-add-btn play" onclick="addTrack(${i},true)">▶ Play</button>
        </div>`;
    }).join('');
  } catch(e) {
    listEl.innerHTML = `<div class="ia-no-results">❌ ${e.message}</div>`;
  }
}

function fmtK(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function resolveTrack(identifier) {
  const res = await fetch(`https://archive.org/metadata/${identifier}`);
  if (!res.ok) throw new Error('Metadata fetch failed');
  const meta = await res.json();
  const files = meta?.files ?? [];
  const EXTS = ['.mp3','.ogg','.m4a','.flac','.wav','.opus'];
  const audio =
    files.find(f => f.name?.toLowerCase().endsWith('.mp3') && !f.name.includes('_vbr') && f.source !== 'metadata') ||
    files.find(f => EXTS.some(ext => f.name?.toLowerCase().endsWith(ext)) && f.source !== 'metadata');
  if (!audio) throw new Error('No playable audio in this item');
  const creator = Array.isArray(meta?.metadata?.creator)
    ? meta.metadata.creator[0]
    : (meta?.metadata?.creator || meta?.metadata?.artist || identifier);
  return {
    url: `https://archive.org/download/${identifier}/${encodeURIComponent(audio.name)}`,
    title: audio.title || audio.name.replace(/\.[^.]+$/, ''),
    artist: creator,
  };
}

async function addTrack(idx, playNow) {
  const track = iaSearchResults[idx];
  if (!track) return;
  const row = document.getElementById(`ia-row-${idx}`);
  const btns = row?.querySelectorAll('.ia-add-btn');
  if (btns) btns.forEach(b => { b.disabled = true; b.textContent = '…'; });
  try {
    const resolved = await resolveTrack(track.identifier);
    const wt = { url: resolved.url, metaData: { title: resolved.title || track.title, artist: resolved.artist || track.creator } };
    webampPlaylist.push(wt);
    webamp.setTracksToPlay(playNow ? [wt, ...webampPlaylist.slice(0,-1)] : [...webampPlaylist]);
    if (btns) {
      btns[0].disabled = false; btns[0].textContent = '✓';
      if (btns[1]) { btns[1].disabled = false; btns[1].textContent = '▶ Play'; }
    }
  } catch(e) {
    console.error(e);
    if (btns) {
      btns[0].disabled = false; btns[0].textContent = '+ Add';
      if (btns[1]) { btns[1].disabled = false; btns[1].textContent = '✗'; }
    }
  }
}

// ══════════════════════════════════════════════════
//  INIT — all DOM listeners here, after parse
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('symbol-selector').addEventListener('change', function() {
    currentSymbol = this.value;
    updateCharts(currentSymbol);
  });

  document.getElementById('chart-count-selector').addEventListener('change', function() {
    visibleCharts = parseInt(this.value);
    updateCharts(currentSymbol);
  });

  document.querySelectorAll('.indicator-buttons .btn').forEach(btn => {
    btn.addEventListener('click', function() {
      this.classList.toggle('active');
      const ind = this.dataset.indicator;
      if (this.classList.contains('active')) {
        if (!selectedIndicators.includes(ind)) selectedIndicators.push(ind);
      } else {
        selectedIndicators = selectedIndicators.filter(i => i !== ind);
      }
      updateCharts(currentSymbol);
    });
  });

  document.querySelectorAll('.timeframe-buttons .btn').forEach(btn => {
    btn.addEventListener('click', function() {
      this.classList.toggle('active');
      const tf = this.dataset.timeframe;
      this.classList.contains('active') ? activeTimeframes.add(tf) : activeTimeframes.delete(tf);
      updateCharts(currentSymbol);
    });
  });

  updateCharts(currentSymbol);
  initWebamp();
});
</script>
